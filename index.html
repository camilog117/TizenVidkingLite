<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidking TV - Cineby Lite</title>
  <style>
    body { background: #000; color: #fff; font-family: Arial; text-align: center; margin: 0; padding: 20px; }
    iframe { width: 100%; height: 85vh; border: none; }
    .menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
    button { padding: 12px 20px; background: #e50914; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🎬 Vidking Player TV</h1>
  <div class="menu">
    <button onclick="loadMovie(1078605)">Weapons (Ejemplo)</button>
    <button onclick="loadMovie(550)">Fight Club</button>
    <button onclick="loadMovie(27205)">Inception</button>
    <button onclick="loadSeries(1399,1,1)">Game of Thrones S01E01</button>
    <!-- Agrega más botones con TMDB IDs que quieras -->
  </div>
  <iframe id="player" allowfullscreen></iframe>

  <script>
    function loadMovie(id) {
      document.getElementById('player').src = `https://www.vidking.net/embed/movie/${id}?autoPlay=true&color=e50914`;
    }
    function loadSeries(id, season, episode) {
      document.getElementById('player').src = `https://www.vidking.net/embed/tv/${id}/${season}/${episode}?autoPlay=true&color=e50914&nextEpisode=true`;
    }
    // Carga un ejemplo al inicio
    window.onload = () => loadMovie(1078605);
  </script>
</body>
</html>
